# CD: đẩy Docker image lên GitHub Container Registry (GHCR).
# Cách dùng:
# 1. Push tag dạng v1.0.0 → build & publish client + server.
# 2. Hoặc chạy thủ công: Actions → "CD — Docker GHCR" → Run workflow (branch main).
#
# Ảnh: ghcr.io/<owner>/<repo>-client:<tag> và ghcr.io/<owner>/<repo>-server:<tag>
# Client cần VITE_API_URL khi build (URL API công khai của bạn), ví dụ https://api.example.com

name: CD — Docker GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag cho image (vd: latest, v1.0.0)'
        required: true
        default: 'latest'
      vite_api_url:
        description: 'VITE_API_URL khi build client (URL backend)'
        required: true
        default: 'http://localhost:3000'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (chữ thường, theo chuẩn Docker)
        id: meta
        run: |
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "client=${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-client" >> "$GITHUB_OUTPUT"
          echo "server=${{ env.REGISTRY }}/${OWNER_LC}/${REPO_LC}-server" >> "$GITHUB_OUTPUT"

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "vite=${{ inputs.vite_api_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "vite=http://localhost:3000" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.meta.outputs.client }}:${{ steps.tag.outputs.value }}
            ${{ steps.meta.outputs.client }}:latest
          build-args: |
            VITE_API_URL=${{ steps.tag.outputs.vite }}

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.server }}:${{ steps.tag.outputs.value }}
            ${{ steps.meta.outputs.server }}:latest
